<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B1020"/>

  <!-- Bank building -->
  <g opacity="0.9">
    <!-- Base -->
    <rect x="250" y="350" width="300" height="150" fill="#10182B" stroke="#FFC500" stroke-width="2"/>

    <!-- Columns -->
    <rect x="280" y="250" width="30" height="100" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <rect x="370" y="250" width="30" height="100" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <rect x="460" y="250" width="30" height="100" fill="#10182B" stroke="#FFC500" stroke-width="2"/>

    <!-- Roof -->
    <polygon points="400,180 200,250 600,250" fill="#10182B" stroke="#FFC500" stroke-width="2"/>

    <!-- Door -->
    <rect x="370" y="420" width="60" height="80" fill="#050816" stroke="#FFC500" stroke-width="2"/>
  </g>

  <!-- Financial symbols floating -->
  <g opacity="0.6">
    <text x="150" y="200" fill="#FFC500" font-size="32" font-weight="bold">$</text>
    <text x="650" y="220" fill="#FFC500" font-size="32" font-weight="bold">€</text>
    <text x="180" y="450" fill="#FFC500" font-size="32" font-weight="bold">£</text>
    <text x="620" y="430" fill="#FFC500" font-size="32" font-weight="bold">¥</text>
  </g>

  <!-- Data streams -->
  <g opacity="0.4">
    <path d="M150 200 Q200 250 250 300" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M650 220 Q600 270 550 320" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="400" cy="300" r="250" fill="url(#glow)"/>
</svg>
