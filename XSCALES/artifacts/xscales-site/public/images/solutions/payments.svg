<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B1020"/>

  <!-- Card with glow -->
  <g opacity="0.8">
    <rect x="200" y="150" width="180" height="120" rx="12" fill="#10182B" stroke="#FFC500" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="290" cy="210" r="30" fill="#FFC500" fill-opacity="0.15"/>
    <path d="M270 210 L290 230 L310 190" stroke="#FFC500" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Transaction flow arrows -->
  <g opacity="0.6">
    <path d="M400 210 L480 210" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="480,210 470,205 470,215" fill="#FFC500"/>
  </g>

  <!-- Second card -->
  <g opacity="0.8">
    <rect x="500" y="150" width="180" height="120" rx="12" fill="#10182B" stroke="#FFC500" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="590" cy="210" r="30" fill="#FFC500" fill-opacity="0.15"/>
    <rect x="575" y="195" width="30" height="30" rx="4" stroke="#FFC500" stroke-width="2" fill="none"/>
  </g>

  <!-- Network nodes -->
  <circle cx="290" cy="380" r="8" fill="#FFC500" opacity="0.6"/>
  <circle cx="400" cy="350" r="8" fill="#FFC500" opacity="0.6"/>
  <circle cx="510" cy="380" r="8" fill="#FFC500" opacity="0.6"/>
  <circle cx="590" cy="420" r="8" fill="#FFC500" opacity="0.6"/>

  <!-- Connection lines -->
  <line x1="290" y1="380" x2="400" y2="350" stroke="#FFC500" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="350" x2="510" y2="380" stroke="#FFC500" stroke-width="1" opacity="0.3"/>
  <line x1="510" y1="380" x2="590" y2="420" stroke="#FFC500" stroke-width="1" opacity="0.3"/>

  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFC500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="400" cy="300" r="200" fill="url(#glow)"/>
</svg>
