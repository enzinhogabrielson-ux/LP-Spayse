<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B1020"/>

  <!-- Central orchestration hub -->
  <g opacity="0.9">
    <circle cx="400" cy="300" r="80" fill="#10182B" stroke="#FFC500" stroke-width="3"/>
    <circle cx="400" cy="300" r="50" fill="#FFC500" fill-opacity="0.2"/>
    <text x="400" y="310" text-anchor="middle" fill="#FFC500" font-size="24" font-weight="bold">API</text>
  </g>

  <!-- Connected systems -->
  <g opacity="0.8">
    <!-- Top -->
    <rect x="350" y="80" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="400" y="115" text-anchor="middle" fill="#FFC500" font-size="12">System A</text>

    <!-- Top Right -->
    <rect x="550" y="150" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="600" y="185" text-anchor="middle" fill="#FFC500" font-size="12">System B</text>

    <!-- Bottom Right -->
    <rect x="550" y="390" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="600" y="425" text-anchor="middle" fill="#FFC500" font-size="12">System C</text>

    <!-- Bottom -->
    <rect x="350" y="460" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="400" y="495" text-anchor="middle" fill="#FFC500" font-size="12">System D</text>

    <!-- Bottom Left -->
    <rect x="150" y="390" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="200" y="425" text-anchor="middle" fill="#FFC500" font-size="12">System E</text>

    <!-- Top Left -->
    <rect x="150" y="150" width="100" height="60" rx="8" fill="#10182B" stroke="#FFC500" stroke-width="2"/>
    <text x="200" y="185" text-anchor="middle" fill="#FFC500" font-size="12">System F</text>
  </g>

  <!-- Connection lines with animation -->
  <g opacity="0.5">
    <line x1="400" y1="220" x2="400" y2="140" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="470" y1="260" x2="550" y2="200" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="470" y1="340" x2="550" y2="410" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="380" x2="400" y2="460" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="330" y1="340" x2="250" y2="410" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="330" y1="260" x2="250" y2="200" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Data flow indicators -->
  <g opacity="0.6">
    <circle cx="400" cy="180" r="4" fill="#FFC500">
      <animate attributeName="cy" values="180;140;180" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="230" r="4" fill="#FFC500">
      <animate attributeName="cx" values="470;550;470" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFC500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="400" cy="300" r="250" fill="url(#glow)"/>
</svg>
