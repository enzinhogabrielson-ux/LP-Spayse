<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B1020"/>

  <!-- World map simplified -->
  <g opacity="0.3" stroke="#FFC500" stroke-width="1" fill="none">
    <!-- Continents outline simplified -->
    <path d="M150 200 Q200 180 250 200 L300 220 L280 260 L200 250 Z"/>
    <path d="M350 180 Q400 160 450 180 L500 200 L480 240 L400 230 Z"/>
    <path d="M550 220 Q600 200 650 220 L680 260 L620 280 L560 260 Z"/>
    <path d="M200 320 Q250 300 300 320 L320 380 L260 390 L210 360 Z"/>
    <path d="M400 340 Q450 320 500 340 L520 400 L460 410 L410 380 Z"/>
  </g>

  <!-- Connection nodes on map -->
  <g opacity="0.8">
    <circle cx="220" cy="220" r="12" fill="#FFC500" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="200" r="12" fill="#FFC500" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="240" r="12" fill="#FFC500" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="350" r="12" fill="#FFC500" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="370" r="12" fill="#FFC500" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines between nodes -->
  <g opacity="0.4">
    <line x1="220" y1="220" x2="420" y2="200" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="420" y1="200" x2="600" y2="240" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="220" x2="260" y2="350" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="420" y1="200" x2="460" y2="370" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="260" y1="350" x2="460" y2="370" stroke="#FFC500" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Currency symbols -->
  <g opacity="0.6" fill="#FFC500" font-size="20" font-weight="bold">
    <text x="200" y="210">$</text>
    <text x="400" y="190">€</text>
    <text x="580" y="230">£</text>
    <text x="240" y="340">¥</text>
    <text x="440" y="360">R$</text>
  </g>

  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="400" cy="300" r="280" fill="url(#glow)"/>
</svg>
